name: Deploy to Hostinger

# Builds the static site and FTP-syncs ./out to the Hostinger account on every
# push to main (or manually from the Actions tab). Requires three repo secrets
# (Settings → Secrets and variables → Actions):
#   FTP_SERVER    e.g. 185.x.x.x or ftp.littlejoestreeservices.co.uk
#   FTP_USERNAME  the hPanel FTP account username
#   FTP_PASSWORD  the hPanel FTP account password
# Point the FTP account's directory at the site's public_html so the sync
# lands directly in the web root.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # --legacy-peer-deps: next-cloudinary pins next@^14 while we run next 15.
      - run: npm ci --legacy-peer-deps

      - run: npm run build

      # lftp mirror is stateless: it diffs against the real server listing, so
      # it can't get confused by a stale sync-state file (which made the
      # previous FTP action fail on phantom deletes). --delete keeps the web
      # root clean of old hashed build files.
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: FTP mirror ./out to web root
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # ssl-protect-data: Hostinger's FTP requires TLS on the data channel
          # too (PROT P) or listings/uploads stall. dns:order inet: skip IPv6,
          # GitHub runners have no IPv6 route to Hostinger.
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" \
            -e "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; \
                set dns:order inet; set net:max-retries 2; set net:timeout 30; \
                mirror -R --delete --parallel=4 --verbose=1 out/ ./; quit" \
            "ftp://$FTP_SERVER"
