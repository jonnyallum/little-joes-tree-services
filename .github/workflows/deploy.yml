name: Deploy to Hostinger

# Builds the static site and FTP-syncs ./out to the Hostinger account on every
# push to main (or manually from the Actions tab). Requires three repo secrets
# (Settings → Secrets and variables → Actions):
#   FTP_SERVER    e.g. 185.x.x.x or ftp.littlejoestreeservices.co.uk
#   FTP_USERNAME  the hPanel FTP account username
#   FTP_PASSWORD  the hPanel FTP account password
# Point the FTP account's directory at the site's public_html so the sync
# lands directly in the web root.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # --legacy-peer-deps: next-cloudinary pins next@^14 while we run next 15.
      - run: npm ci --legacy-peer-deps

      - run: npm run build

      - name: FTP sync ./out to web root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: out/
          server-dir: ./
